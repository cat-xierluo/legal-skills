name: Release Skills (monorepo)

on:
  push:
    # CalVer + 可选后缀:v2026.06.30 或 v2026.06.30-v2 / v2026.06.30.1 等
    tags: ['v20[0-9][0-9].[0-9][0-9].[0-9][0-9]*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2026.06.30 or v2026.06.30-v2)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build zips
        run: bash skills/release-workflow/scripts/build-zips.sh "${GITHUB_REF_NAME}"

      - name: Generate release notes
        # 从 README 自动提取"最近更新"表格 + 项目 notes: 配置,生成结构化 body
        # 优先用 projects.yaml 里的 legal-skills notes: 个性化配置
        # 失败时回退到默认(脚本会按 repo 名生成)
        run: |
          python3 skills/release-workflow/scripts/generate-release-notes.py \
            "${{ github.repository }}" \
            "${GITHUB_REF_NAME}" \
            "legal-skills" || \
          python3 skills/release-workflow/scripts/generate-release-notes.py \
            "${{ github.repository }}" \
            "${GITHUB_REF_NAME}"

      - name: Create release & upload
        uses: softprops/action-gh-release@d99959edae48b5ffffd7b00da66dcdb0a33a52ee  # v2.0.2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: "Skills Release ${{ github.ref_name || inputs.tag }}"
          body_path: .release-notes.md
          fail_on_unmatched_files: false
          files: |
            pack-skills/*.zip