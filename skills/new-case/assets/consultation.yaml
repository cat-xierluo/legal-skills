# consultation.yaml — 潜在项目/咨询预设
# 轻量级2目录结构 + 参照度分级编号

meta:
  id: "consultation"
  name: "潜在项目/咨询"
  description: "潜在客户咨询、案件初步评估阶段"
  case_id_format: "{YYMMDD} {客户/对方简称} {事项关键词}"
  example_case_id: "260323 张美金 浙江腾宇包装公司 咨询"
  numbering:
    format: "{参照度}-{三位序号} {描述}.{扩展名}"
    levels:
      A: "活文档，持续迭代（律师分析、方案、测算）"
      B: "常查，反复引用（关键转写、核心证据、数据）"
      C: "存档，基本不再看（AI咨询文档、低信息量材料）"
      D: "待激活，转化时可能需要（压缩包原件、未处理文件）"
    rule: "序号全局唯一不重叠，参照度可随项目进展调整"
    a_level_order: "一手沟通记录 → 案件分析 → 策略方案，一手信息编号最前"

directories:
  - id: "01"
    icon: "📂"
    name: "客户材料"
    description: "客户提供的所有材料：录音、截图、文档、聊天记录、AI咨询文档等。内部可按主题分子文件夹，但统一归入此目录"

  - id: "02"
    icon: "📝"
    name: "工作文件"
    description: "律师内部工作产出：案件分析、法律服务方案、法律研究、策略建议、谈判方案、事实梳理等"

root_files:
  - pattern: "*项目信息*"
    description: "项目信息卡片（管理文件）"
  - pattern: "*待办事项*"
    description: "待办事项（管理文件）"
  - pattern: "*材料清单*"
    description: "材料清单（管理文件）"

management_files:
  case_info:
    enabled: true
    template: "templates/consultation-info.md"
    output: "[项目编号] 项目信息.md"
  timesheet:
    enabled: false
  deadline_yaml:
    enabled: false
  task_list:
    enabled: true
    template: "templates/task-list.md"
    output: "[项目编号] 待办事项.md"

detection:
  path_patterns:
    - "潜在项目"
    - "咨询"
  material_hints:
    - "咨询"
    - "录音"
    - "聊天记录"
    - "法律服务方案"
    - "法律意见书"
    - "法律问答"
    - "内部沟通"
    - "应对说明"
  negative_hints:
    - "传票"
    - "应诉通知书"
    - "判决书"

classification:
  # 01 - 客户材料：客户提供的一切材料
  - match: ["身份证", "营业执照", "授权书"]
    target: "01"
  - match: ["合同", "协议", "声明", "发票", "收据"]
    target: "01"
  - match: ["鉴定", "公证书", "评估"]
    target: "01"
  - match: ["版权", "著作权", "专利", "商标", "权属"]
    target: "01"
  - match: ["证据目录", "证据材料"]
    target: "01"
  - match: ["起诉状", "答辩状", "申请书"]
    target: "01"
  - match: ["咨询", "通话记录", "电话"]
    target: "01"
  - match: ["聊天记录", "微信"]
    target: "01"
  - match: ["mp3", "aac", "wav", "m4a", "mp4"]
    target: "01"
  - match: ["转写", "语音"]
    target: "01"
  - match: ["追问", "AI咨询", "原始咨询"]
    target: "01"
  - match: ["csv", "xlsx", "xls"]
    target: "01"

  # 02 - 工作文件：律师内部产出
  - match: ["内部沟通", "内部报告", "内部"]
    target: "02"
  - match: ["法律问答", "问答提取"]
    target: "02"
  - match: ["案件分析", "案件摘要", "应对说明"]
    target: "02"
  - match: ["策略", "方案草稿"]
    target: "02"
  - match: ["法律服务方案"]
    target: "02"
  - match: ["事实梳理", "争议焦点", "评估", "测算", "检索报告"]
    target: "02"
  - match: ["法律研究", "法律分析"]
    target: "02"
  - match: ["核实清单", "沟通核实"]
    target: "02"
