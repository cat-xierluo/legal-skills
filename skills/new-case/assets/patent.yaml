# patent.yaml — 专利案件预设
# 单一预设下挂 3 个业务子模板（按业务子类型选模板，不创建空目录）
# 目录顺序按"项目进展"排列：委托 → 清单 → 客户 → 律师工作 → 申请书 → 官方 → 发票
# - application: 专利申请（发明/实用新型/外观/PCT） 7 目录
# - invalidation: 复审/无效 8 目录
# - search: 检索/布局/变更/年费 4 目录

meta:
  id: "patent"
  name: "专利案件"
  description: "发明/实用新型/外观/无效/复审/检索/PCT/变更/年费等专利业务；单一预设下按业务类型选择 3 个子模板，目录顺序按项目进展"
  case_id_format: "{YYMMDD} {客户简称} {业务子类型}"
  case_name_format: "{客户简称} {专利名} {业务子类型}"
  example_case_id: "260316 上海生机智联 发明专利申请"
  example_case_name: "上海生机智联 智能体 发明专利申请案"

# 业务子类型 → 模板的映射
business_type_templates:
  invention: "application"        # 发明专利申请
  utility: "application"          # 实用新型申请
  design: "application"           # 外观设计申请
  pct: "application"              # PCT 国际申请
  review: "invalidation"          # 专利复审
  invalidation: "invalidation"    # 专利无效
  search: "search"                # 专利检索
  layout: "search"                # 专利布局（与检索合并）
  change: "search"                # 专利变更（与检索合并）
  annual_fee: "search"            # 年费管理（与检索合并）

# 3 个子模板
# 目录顺序设计原则（DEC-008 + DEC-009）：
#   1 委托材料（含工作记录：微信/邮件/会议纪要）→ 2 申请清单/客户提供 → 3 客户提供/律师工作 → 4-5 律师工作/申请书 → 6-7 国知局文件 → 7-8 发票/财务
#   即按"项目进展"：启动（委托+沟通）→ 准备（清单+客户）→ 律师产出 → 官方 → 收尾
#   2 工作记录 已合并进 1 委托材料（沟通录音/邮件/会议纪要本质是律师-客户工作过程记录）

templates:

  # ========== 模板 1: 专利申请 ==========
  application:
    name: "专利申请模板"
    description: "发明/实用新型/外观/PCT 国际申请。7 目录按项目进展：委托（含工作记录）→ 申请清单 → 客户提供 → 律师工作 → 申请书 → 国知局文件 → 发票财务"
    business_types: ["发明专利申请", "实用新型申请", "外观设计申请", "PCT国际申请"]
    directories:
      - id: "1"
        icon: "📑"
        name: "委托材料"
        description: "专利代理委托书、专利代理合同/协议、营业执照、身份证、律所执业许可证、法律服务方案；以及律师-客户工作记录（微信聊天/录音 .aac/.mp3 + 转写 .md、邮件、会议纪要、电话沟通）"
        core_files: ["专利代理委托书", "专利代理合同"]
      - id: "2"
        icon: "📋"
        name: "申请清单"
        description: "拟申请哪些专利/类别、清单 V1/V2 迭代版、PCT 申请清单"
        core_files: ["专利申请清单"]
      - id: "3"
        icon: "📥"
        name: "客户提供"
        description: "技术交底书、现有技术资料、产品说明书、图纸"
        core_files: ["技术交底书"]
      - id: "4"
        icon: "📊"
        name: "律师工作"
        description: "律师产出 + 进程跟踪：检索报告、新颖性创造性分析、技术方案对比、申请规划、参考材料/范本、相关厂家分析、文件进程节点（一通/二通/三通/驳回/复审/授权时间线）"
        core_files: ["专利检索报告", "新颖性创造性分析"]
      - id: "5"
        icon: "✍️"
        name: "申请书"
        description: "律师起草：专利请求书、说明书、权利要求书、说明书摘要、说明书附图、实质审查请求书、PCT 国际申请文件"
        core_files: ["专利请求书", "权利要求书"]
      - id: "6"
        icon: "🏛️"
        name: "国知局文件"
        description: "国家知识产权局文书：受理通知书、缴费通知书、初步审查合格通知书、实质审查请求审查意见通知书、第一次/二/三次审查意见通知书、驳回决定、授权通知书、专利证书"
        core_files: ["国知局受理通知书", "国知局授权通知书", "专利证书"]
      - id: "7"
        icon: "💰"
        name: "发票/财务"
        description: "代理费发票、官费缴费凭证"
        core_files: ["代理费发票"]
    classification:
      - match: ["专利代理委托书", "委托协议", "代理协议", "三方协议"]
        target: "1"
      - match: ["专利代理合同", "代理合同"]
        target: "1"
      - match: ["法律服务方案", "代理报价", "费用方案"]
        target: "1"
      - match: ["营业执照", "身份证", "执业许可证", "公证委托", "法定代表人身份证明", "主体资格证照"]
        target: "1"
      - match: ["微信聊天", "微信记录", "邮件往来", "工作记录", "电话沟通", "会议纪要", "沟通记录"]
        target: "1"
      - match: ["微信录音", "录音", ".aac", ".mp3", ".wav", ".m4a", ".mp4"]
        target: "1"
      - match: ["转写", "录音转写"]
        target: "1"
      - match: ["专利申请清单", "申请清单", "PCT 申请清单", "专利清单", "拟申请"]
        target: "2"
      - match: ["技术交底书", "交底书", "技术资料", "技术方案", "产品说明书", "图纸", "现有技术"]
        target: "3"
      - match: ["客户提供", "客户提交"]
        target: "3"
      - match: ["专利请求书", "请求书", "权利要求书", "权利要求", "说明书摘要", "说明书附图"]
        target: "5"
      - match: ["实质审查请求书", "实审请求", "实审"]
        target: "5"
      - match: ["PCT", "国际申请", "国际检索", "国际初步审查"]
        target: "5"
      - match: ["受理通知书", "缴费通知书", "初步审查", "初审合格"]
        target: "6"
      - match: ["第一次审查意见", "第二次审查意见", "第三次审查意见", "一通", "二通", "三通", "审查意见通知书", "审查意见答复"]
        target: "6"
      - match: ["驳回决定", "驳回通知书", "驳回"]
        target: "6"
      - match: ["授权通知书", "授权", "专利证书", "授权公告"]
        target: "6"
      - match: ["文件进程", "进程跟踪", "时间线", "流程图", "节点跟踪", "审查时间线"]
        target: "4"
      - match: ["检索报告", "检索式", "检索结果", "数据库检索"]
        target: "4"
      - match: ["新颖性", "创造性", "实用性", "三性分析", "对比分析", "技术对比", "申请规划", "策略分析"]
        target: "4"
      - match: ["参考材料", "范本", "相关厂家", "相关资料", "模板"]
        target: "4"
      - match: ["代理费发票", "代理费凭证", "律师费发票", "律师费凭证", "官费发票"]
        target: "7"

  # ========== 模板 2: 复审/无效 ==========
  invalidation:
    name: "复审/无效模板"
    description: "专利复审/无效宣告。8 目录按项目进展：委托（含工作记录）→ 客户提供 → 律师工作 → 申请书 → 证据 → 对方 → 国知局 → 发票。证据/对方提交 是复审/无效特有"
    business_types: ["专利复审", "专利无效"]
    directories:
      - id: "1"
        icon: "📑"
        name: "委托材料"
        description: "专利复审/无效委托书、合同、营业执照、身份证、律所执业许可证；以及律师-客户工作记录（含口审沟通）（微信/邮件/会议纪要）"
        core_files: ["复审/无效委托书"]
      - id: "2"
        icon: "📥"
        name: "客户提供"
        description: "客户提供的技术资料、现有技术证据、与本专利相关的使用证据"
        core_files: ["技术资料"]
      - id: "3"
        icon: "📊"
        name: "律师工作"
        description: "律师产出 + 进程跟踪：新颖性创造性分析、复审/无效策略、口审策略、检索报告、参考材料、复审/无效时间线（申请→受理→口审→决定节点）"
        core_files: ["无效策略", "新颖性创造性分析"]
      - id: "4"
        icon: "✍️"
        name: "申请书"
        description: "律师起草：复审请求书、无效宣告请求书/答辩书、意见陈述书、口审代理词"
        core_files: ["复审请求书", "无效宣告请求书"]
      - id: "5"
        icon: "📎"
        name: "证据材料"
        description: "对比文件 1/D1、对比文件 2/D2、现有技术证据、关联文献；可按申请号或对比文件编号分子目录"
        core_files: ["对比文件"]
      - id: "6"
        icon: "📤"
        name: "对方提交"
        description: "对方当事人（专利权人/无效宣告请求人）提交的所有材料：意见陈述书、证据、答辩材料、口审相关材料"
        core_files: ["对方意见陈述书"]
      - id: "7"
        icon: "🏛️"
        name: "国知局文件"
        description: "复审受理通知书、口审通知书、复审决定书、无效宣告请求审查决定书"
        core_files: ["复审决定书", "无效决定书", "口审通知书"]
      - id: "8"
        icon: "💰"
        name: "发票/财务"
        description: "代理费发票、复审/无效官费缴费凭证"
        core_files: ["代理费发票"]
    classification:
      - match: ["复审委托书", "无效委托书", "委托协议", "委托书"]
        target: "1"
      - match: ["复审代理合同", "无效代理合同", "代理合同"]
        target: "1"
      - match: ["法律服务方案", "代理报价", "费用方案"]
        target: "1"
      - match: ["营业执照", "身份证", "执业许可证", "公证委托", "法定代表人身份证明", "主体资格证照"]
        target: "1"
      - match: ["微信聊天", "微信记录", "邮件往来", "工作记录", "电话沟通", "会议纪要", "口审沟通", "沟通记录"]
        target: "1"
      - match: ["微信录音", "录音", ".aac", ".mp3", ".wav", ".m4a", ".mp4"]
        target: "1"
      - match: ["转写", "录音转写"]
        target: "1"
      - match: ["技术交底书", "交底书", "技术资料", "技术方案", "现有技术", "使用证据", "客户提供", "客户提交"]
        target: "2"
      - match: ["文件进程", "进程跟踪", "时间线", "流程图", "节点跟踪", "复审时间线", "无效时间线"]
        target: "3"
      - match: ["检索报告", "检索式", "检索结果"]
        target: "3"
      - match: ["新颖性", "创造性", "实用性", "三性分析", "对比分析", "技术对比", "复审策略", "无效策略", "口审策略", "应诉策略"]
        target: "3"
      - match: ["参考材料", "范本", "相关厂家", "相关资料", "模板"]
        target: "3"
      - match: ["复审请求书", "无效宣告请求书", "无效请求", "意见陈述书", "答辩书", "口审代理词", "复审答辩", "无效答辩"]
        target: "4"
      - match: ["对比文件", "D1", "D2", "D3", "现有技术证据", "关联文献", "对比文献", "证据材料", "证据目录"]
        target: "5"
      - match: ["对方提交", "对方意见", "对方证据", "对方答辩", "专利权人意见", "请求人意见", "对方意见陈述书"]
        target: "6"
      - match: ["复审受理", "复审受理通知书", "口审通知书", "复审决定书", "复审决定", "无效决定", "无效宣告请求审查决定", "无效审查决定"]
        target: "7"
      - match: ["代理费发票", "代理费凭证", "律师费发票", "律师费凭证", "官费发票", "复审官费", "无效官费"]
        target: "8"

  # ========== 模板 3: 检索/布局/变更/年费 ==========
  search:
    name: "检索/其他模板"
    description: "专利检索/布局/变更/年费等小批量管理业务。4 目录按项目进展：委托（含工作记录）→ 任务清单 → 律师工作 → 发票财务"
    business_types: ["专利检索", "专利布局", "专利变更", "年费管理"]
    directories:
      - id: "1"
        icon: "📑"
        name: "委托材料"
        description: "检索/变更/年费代缴委托协议、合同、营业执照；以及律师-客户工作记录（检索需求/变更/年费提醒沟通，微信/邮件/会议纪要）"
        core_files: ["委托协议"]
      - id: "2"
        icon: "📋"
        name: "任务清单"
        description: "检索项目：拟检索目标专利清单；变更项目：拟变更的专利清单；年费项目：代缴年费的专利清单"
        core_files: ["任务清单"]
      - id: "3"
        icon: "📊"
        name: "律师工作"
        description: "律师产出 + 进程跟踪：检索报告/分析、布局策略、变更申请书/合同、年费监控表、文件进程节点"
        core_files: ["检索报告", "策略分析"]
      - id: "4"
        icon: "💰"
        name: "发票/财务"
        description: "检索费/变更官费/年费代缴凭证"
        core_files: ["服务费发票"]
    classification:
      - match: ["检索委托", "变更委托", "年费代缴委托", "委托协议", "委托书"]
        target: "1"
      - match: ["检索合同", "变更合同", "年费合同", "服务合同", "代理合同"]
        target: "1"
      - match: ["法律服务方案", "代理报价", "费用方案"]
        target: "1"
      - match: ["营业执照", "身份证", "执业许可证"]
        target: "1"
      - match: ["微信聊天", "微信记录", "邮件往来", "工作记录", "电话沟通", "会议纪要", "沟通记录"]
        target: "1"
      - match: ["微信录音", "录音", ".aac", ".mp3"]
        target: "1"
      - match: ["转写", "录音转写"]
        target: "1"
      - match: ["检索清单", "拟检索", "变更清单", "拟变更", "年费清单", "专利清单", "监控清单", "任务清单"]
        target: "2"
      - match: ["文件进程", "进程跟踪", "时间线", "节点跟踪"]
        target: "3"
      - match: ["检索报告", "检索式", "检索结果", "新颖性", "创造性", "三性分析", "可专利性", "侵权风险", "FTO"]
        target: "3"
      - match: ["布局策略", "专利布局", "布局规划", "布局分析"]
        target: "3"
      - match: ["变更申请书", "著录项目变更", "转让申请书", "许可备案", "变更合同"]
        target: "3"
      - match: ["年费监控", "年费表", "年费缴纳记录", "滞纳金监控"]
        target: "3"
      - match: ["参考材料", "范本", "模板", "相关资料"]
        target: "3"
      - match: ["检索费", "变更官费", "年费代缴", "服务费发票", "代理费发票", "律师费发票", "官费发票"]
        target: "4"

# 公共：管理文件生成（所有模板共用同一份）
management_files:
  case_info:
    enabled: true
    template: "templates/patent-info.md"
    output: "[项目编号] 项目信息.md"
  timesheet:
    enabled: false
  deadline_yaml:
    enabled: false
  task_list:
    enabled: true
    template: "templates/patent-task-list.md"
    output: "[项目编号] 待办事项.md"

# 公共：自动检测规则
detection:
  path_patterns:
    - "专利"
    - "patent"
    - "知产"
  material_hints:
    - "专利代理委托书"
    - "专利请求书"
    - "专利申请"
    - "专利无效"
    - "专利复审"
    - "实质审查"
    - "审查意见"
    - "专利检索"
    - "国知局"
    - "对比文件"
  negative_hints:
    - "传票"
    - "应诉通知书"
    - "判决书"
    - "起诉状"

# 关键时间线事件类型枚举（所有模板共用）
timeline_event_types:
  - 委托签约
  - 提交申请
  - 受理
  - 缴费
  - 初步审查
  - 公开
  - 实质审查请求
  - 一通
  - 二通
  - 三通
  - 驳回
  - 复审请求
  - 复审受理
  - 复审决定
  - 口审
  - 授权
  - 证书下发
  - 无效请求
  - 无效受理
  - 无效决定
  - 变更
  - 转让
  - 年费缴纳

# 业务子类型枚举（10 个）
business_types:
  - id: "invention"
    name: "发明专利申请"
    template: "application"
    description: "发明专利首次申请（最高保护期限 20 年，需实质审查）"
  - id: "utility"
    name: "实用新型申请"
    template: "application"
    description: "实用新型申请（保护期限 10 年，形式审查）"
  - id: "design"
    name: "外观设计申请"
    template: "application"
    description: "外观设计申请（保护期限 15 年，形式审查）"
  - id: "pct"
    name: "PCT国际申请"
    template: "application"
    description: "PCT 国际专利申请"
  - id: "invalidation"
    name: "专利无效"
    template: "invalidation"
    description: "对已授权专利提出无效宣告请求"
  - id: "review"
    name: "专利复审"
    template: "invalidation"
    description: "对驳回决定申请复审"
  - id: "search"
