# trademark.yaml — 商标案件预设
# 单一预设下挂 2 个业务子模板（按业务子类型选模板，不创建空目录）
# 目录顺序按"项目进展"排列：委托 → 图样 → 申请书 → 律师工作 → 官方文书（不含注册证）→ 商标注册证（独立）→ 发票财务
# - registration: 商标注册/变更/转让（"我方商标"管理类）7 目录（2026-06-11 加 06 - 📜 商标注册证）
# - opposition: 商标异议/复审/无效（对抗性，涉他人商标或官方决定挑战）8 目录（2026-06-11 加 07 - 📜 商标注册证）

meta:
  id: "trademark"
  name: "商标案件"
  description: "商标注册/变更/异议/复审/无效等商标业务；单一预设下按业务类型选择 2 个子模板（注册 7 目录/异议复审无效 8 目录），目录顺序按项目进展"
  case_id_format: "{YYMMDD} {客户简称} {业务子类型}"
  case_name_format: "{客户简称} {商标名} {业务子类型}"
  example_case_id: "{YYMMDD} {客户简称} 商标注册"
  example_case_name: "{客户简称} {商标名} 商标注册案"

  # 案件文件夹命名规则（用户 2026-06-11 决策）
  # 与诉讼项目（00-11）一致：日期用 YYMMDD 6 位，文件夹名必须含业务子类型后缀
  naming_convention:
    format: "{YYMMDD} {客户/商标简称} {业务子类型}"
    date_format: "YYMMDD 6 位数字（与诉讼项目保持一致）"
    separator: "单个空格分隔三段"
    business_types:
      - id: "商标注册"
        template: "registration"
        applicable_for: ["首次申请", "续展", "防御性注册"]
      - id: "商标变更"
        template: "registration"
        applicable_for: ["注册人名义/地址变更", "删减商品项目", "其他著录事项变更"]
      - id: "商标转让"
        template: "registration"
        applicable_for: ["商标权转让"]
      - id: "商标检索"
        template: "search"  # 需改用专利 search 模板的对应版本（商标暂无独立检索模板，使用 registration 模板即可）
        applicable_for: ["注册前近似性检索", "客户主动查询", "无后续申请"]
      - id: "商标复审"
        template: "opposition"
        applicable_for: ["驳回商标注册申请复审", "部分驳回复审"]
      - id: "商标异议"
        template: "opposition"
        applicable_for: ["对他人初审公告商标提异议"]
      - id: "商标无效"
        template: "opposition"
        applicable_for: ["对已注册商标宣告无效"]
      - id: "商标续展"
        template: "registration"
        applicable_for: ["注册商标有效期续展"]
    client_shorthand_rules:
      - "客户公司全称过长时（如`{公司全称过长示例}`）→ 用核心品牌/项目简称（如`{品牌简称}`）"
      - "商标名比客户名更具识别度时，优先用商标名（如`{商标名示例}`）"
      - "多案件号的同类项目（如同一客户多件商标注册）→ 在客户简称后追加类别或商标名区分"
    examples:
      good:
        - "{YYMMDD} {客户简称} 商标注册"
        - "{YYMMDD} {客户简称} 商标检索"
        - "{YYMMDD} {客户简称} 商标复审"
        - "{YYMMDD} {客户简称} {商标名} 商标注册"
      bad:
        - "{YYMMDD} {客户简称}"                 # 缺业务子类型
        - "YYYY/MM/DD {客户简称} {业务类型}"   # 日期格式错误
        - "{YYMMDD}-{Pinyin}-Trademark"        # 含非中文字符
    ux_rules:
      - "整理新案件时，先按 backup/原文件名推断业务子类型，再用 mv 改名"
      - "已结案的简单检索（仅 1-2 个检索报告文件）可保留业务子类型后缀以保持命名一致"
      - "多子项目案件（如某客户同时含 注册/变更/复审/无效 多个子项目）→ 根目录用主项目业务子类型（如`商标变更`），子项目用各自业务子类型"

# 业务子类型 → 模板的映射
business_type_templates:
  registration: "registration"  # 商标注册
  change: "registration"        # 商标变更/转让（"我方商标"管理类）
  opposition: "opposition"      # 商标异议（对他人在初审公告的商标提异议）
  review: "opposition"          # 商标复审（对驳回决定申请复审）
  invalidation: "opposition"    # 商标无效（对已注册商标宣告无效）

# 2 个子模板
# 目录顺序设计原则（DEC-008 + DEC-009）：
#   1 委托材料 → 2 商标图样 → 3 申请书 → 4 律师工作 → 5 官方文书（不含注册证）→ 6/7 商标注册证（独立）→ 7/8 发票财务
#   即按"项目进展"：启动（委托+沟通）→ 准备（清单/图样）→ 律师产出（申请书/工作）→ 官方 → 收尾
#   商标的"沟通/工作记录"并入 1 委托材料（与专利 DEC-009 一致）

templates:

  # ========== 模板 1: 商标注册 ==========
  registration:
    name: "商标注册模板"
    description: "商标注册/变更/转让。7 目录按项目进展：委托（含工作记录）→ 商标图样 → 申请书 → 律师工作 → 官方文书（不含注册证）→ 商标注册证（独立）→ 发票财务"
    business_types: ["商标注册", "商标变更"]
    directories:
      - id: "01"
        icon: "📑"
        name: "委托材料"
        description: "商标代理委托书、商标代理合同/协议、营业执照、身份证、律所执业许可证、法律服务方案；以及律师-客户工作记录（微信聊天/录音 .aac/.mp3 + 转写 .md、邮件、会议纪要、电话沟通）"
        core_files: ["商标代理委托书", "商标代理合同"]
      - id: "02"
        icon: "🖼️"
        name: "商标图样"
        description: "商标图样（彩色稿、黑白稿、修改版本、设计源文件 .ai/.psd/画板）"
        core_files: ["商标图样"]
      - id: "03"
        icon: "✍️"
        name: "申请书"
        description: "律师起草：商标注册申请书、变更/转让申请书"
        core_files: ["商标注册申请书"]
      - id: "04"
        icon: "📊"
        name: "律师工作"
        description: "律师产出 + 进程跟踪：商标检索报告、近似分析、驳回应对、复审应对、变更合同、参考材料/范本、文件进程节点（补正/驳回/复审时间线）"
        core_files: ["商标检索报告", "近似分析"]
      - id: "05"
        icon: "🏛️"
        name: "官方文书"
        description: "国家知识产权局商标局文书：受理通知书、补正通知书、缴费通知书、部分驳回通知、驳回通知、驳回复审决定、注册公告、变更证明。**注意：商标注册证不在此目录，归 06 - 📜 商标注册证/**"
        core_files: ["商标受理通知书", "驳回通知书"]
      - id: "06"
        icon: "📜"
        name: "商标注册证"
        description: "商标注册证 PDF（独立一级目录，DEC-2026-06-11）。**文件名加 YYMMDD 日期前缀**，日期读 mtime/birth time。已带日期前缀的跳过。"
        core_files: ["商标注册证"]
      - id: "07"
        icon: "💰"
        name: "发票财务"
        description: "代理费发票、官费缴费凭证。**实际目录名 `💰 发票财务`**（macOS 终端不支持文件名含 `/`）"
        core_files: ["代理费发票"]
    classification:
      - match: ["商标代理委托书", "委托书", "代理协议", "三方协议"]
        target: "01"
      - match: ["商标代理合同", "代理合同"]
        target: "01"
      - match: ["法律服务方案", "代理报价", "费用方案"]
        target: "01"
      - match: ["营业执照", "身份证", "执业许可证", "公证委托", "法定代表人身份证明", "主体资格证照"]
        target: "01"
      - match: ["微信聊天", "微信记录", "邮件往来", "工作记录", "电话沟通", "会议纪要", "沟通记录"]
        target: "01"
      - match: ["微信录音", "录音", ".aac", ".mp3", ".wav", ".m4a", ".mp4"]
        target: "01"
      - match: ["转写", "录音转写"]
        target: "01"
      - match: ["商标图样", "图样", "logo", "黑白", "彩稿", "画板"]
        target: "02"
      - match: ["商标注册申请书", "注册申请书", "申请书"]
        target: "03"
      - match: ["变更申请书", "转让申请书", "著录项目变更"]
        target: "03"
      - match: ["文件进程", "进程跟踪", "时间线", "流程图", "节点跟踪"]
        target: "04"
      - match: ["检索报告", "检索式", "检索结果", "商标检索"]
        target: "04"
      - match: ["近似分析", "近似比对", "驳回应对", "复审应对"]
        target: "04"
      - match: ["参考材料", "范本", "相关资料", "模板"]
        target: "04"
      - match: ["受理通知书", "缴费通知书", "补正通知书", "初审公告", "初审合格"]
        target: "05"
      - match: ["部分驳回", "驳回通知书", "驳回"]
        target: "05"
      - match: ["驳回复审决定", "注册公告", "授权", "变更证明"]
        target: "05"
      - match: ["商标注册证", "注册证"]
        target: "06"
      - match: ["代理费发票", "代理费凭证", "律师费发票", "律师费凭证", "官费发票"]
        target: "06"

  # ========== 模板 2: 商标异议/复审/无效 ==========
  opposition:
    name: "商标异议/复审/无效模板"
    description: "商标异议/复审/无效。8 目录按项目进展：委托（含工作记录）→ 商标图样 → 申请书 → 律师工作 → 证据材料 → 官方文书（不含注册证）→ 商标注册证（独立）→ 发票财务"
    business_types: ["商标异议", "商标复审", "商标无效"]
    directories:
      - id: "01"
        icon: "📑"
        name: "委托材料"
        description: "商标代理委托书、商标异议/复审/无效委托书、合同、营业执照、身份证、律所执业许可证、法律服务方案；以及律师-客户工作记录（微信/邮件/会议纪要）"
        core_files: ["异议/复审/无效委托书"]
      - id: "02"
        icon: "🖼️"
        name: "商标图样"
        description: "本方商标图样 + 对方商标图样（初审公告/注册证扫描）、引证商标图样"
        core_files: ["本方图样", "对方图样"]
      - id: "03"
        icon: "✍️"
        name: "申请书"
        description: "律师起草：商标异议申请书、复审请求书、商标无效宣告请求书/答辩书、意见陈述书、补充理由书"
        core_files: ["异议申请书", "复审请求书"]
      - id: "04"
        icon: "📊"
        name: "律师工作"
        description: "律师产出 + 进程跟踪：商标检索报告、近似分析、异议/复审/无效策略、理由论证、参考材料、文件进程节点（受理→补正→决定时间线）"
        core_files: ["检索报告", "策略分析"]
      - id: "05"
        icon: "📎"
        name: "证据材料"
        description: "异议/复审/无效案件证据：引证商标使用证据、知名度证据、对方侵权证据、合同/发票/宣传材料；可按证据组分子目录"
        core_files: ["证据目录"]
      - id: "06"
        icon: "🏛️"
        name: "官方文书"
        description: "商标局文书：异议申请补正通知书、缴费通知书、受理通知书、异议裁定书、复审决定书、无效宣告请求裁定书。**注意：商标注册证不在此目录，归 07 - 📜 商标注册证/**"
        core_files: ["受理通知书", "异议裁定书", "复审决定书", "无效裁定书"]
      - id: "07"
        icon: "📜"
        name: "商标注册证"
        description: "商标注册证 PDF（独立一级目录，DEC-2026-06-11）。**文件名加 YYMMDD 日期前缀**，日期读 mtime/birth time。已带日期前缀的跳过。"
        core_files: ["商标注册证"]
      - id: "08"
        icon: "💰"
        name: "发票财务"
        description: "代理费发票、官费缴费凭证。**实际目录名 `💰 发票财务`**（macOS 终端不支持文件名含 `/`）"
        core_files: ["代理费发票"]
    classification:
      - match: ["商标异议代理委托书", "商标复审委托书", "无效委托书", "委托书", "代理协议"]
        target: "01"
      - match: ["商标异议合同", "复审合同", "无效合同", "代理合同"]
        target: "01"
      - match: ["法律服务方案", "代理报价", "费用方案"]
        target: "01"
      - match: ["营业执照", "身份证", "执业许可证", "公证委托", "法定代表人身份证明", "主体资格证照"]
        target: "01"
      - match: ["微信聊天", "微信记录", "邮件往来", "工作记录", "电话沟通", "会议纪要", "沟通记录"]
        target: "01"
      - match: ["微信录音", "录音", ".aac", ".mp3", ".wav", ".m4a", ".mp4"]
        target: "01"
      - match: ["转写", "录音转写"]
        target: "01"
      - match: ["商标图样", "本方图样", "对方图样", "引证商标", "图样", "logo", "黑白", "彩稿", "画板", "初审公告"]
        target: "02"
      - match: ["商标异议申请书", "异议申请书", "分离式异议申请书"]
        target: "03"
      - match: ["复审请求书", "复审申请书"]
        target: "03"
      - match: ["无效宣告请求书", "无效请求书", "无效答辩书", "意见陈述书", "补充理由书"]
        target: "03"
      - match: ["文件进程", "进程跟踪", "时间线", "流程图", "节点跟踪"]
        target: "04"
      - match: ["检索报告", "检索式", "检索结果", "商标检索"]
        target: "04"
      - match: ["近似分析", "近似比对", "异议策略", "复审策略", "无效策略", "理由", "论证"]
        target: "04"
      - match: ["参考材料", "范本", "相关资料", "模板"]
        target: "04"
      - match: ["证据", "使用证据", "知名度证据", "侵权证据", "证据目录", "证据材料"]
        target: "05"
      - match: ["受理通知书", "补正通知书", "缴费通知书", "缴费清单"]
        target: "06"
      - match: ["异议裁定书", "异议决定", "裁定书"]
        target: "06"
      - match: ["驳回复审决定", "复审决定", "复审决定书"]
        target: "06"
      - match: ["注册证", "商标注册证"]
        target: "07"
      - match: ["无效宣告请求裁定", "无效裁定", "无效决定", "无效审查决定"]
        target: "06"
      - match: ["代理费发票", "代理费凭证", "律师费发票", "律师费凭证", "官费发票"]
        target: "07"

# 公共：管理文件生成（所有模板共用同一份）
management_files:
  case_info:
    enabled: true
    template: "templates/trademark-info.md"
    output: "[项目编号] 项目信息.md"
  timesheet:
    enabled: false
  deadline_yaml:
    enabled: false
  task_list:
    enabled: true
    template: "templates/trademark-task-list.md"
    output: "[项目编号] 待办事项.md"

# 公共：自动检测规则
detection:
  path_patterns:
    - "商标"
    - "trademark"
  material_hints:
    - "商标代理委托书"
    - "商标注册申请书"
    - "商标驳回通知书"
    - "商标注册证"
    - "商标异议"
    - "商标复审"
    - "商标无效"
    - "商标变更"
  negative_hints:
    - "传票"
    - "应诉通知书"
    - "判决书"
    - "起诉状"

# 关键时间线事件类型枚举（所有模板共用）
timeline_event_types:
  - 委托签约
  - 提交申请
  - 受理
  - 缴费
  - 补正
  - 初审公告
  - 异议申请
  - 异议受理
  - 异议裁定
  - 驳回
  - 复审请求
  - 复审决定
  - 无效请求
  - 无效裁定
  - 注册公告
  - 证书下发
  - 变更
  - 转让
  - 续展

# 业务子类型枚举（5 个）
business_types:
  - id: "registration"
    name: "商标注册"
    template: "registration"
    description: "商标首次注册申请"
  - id: "opposition"
    name: "商标异议"
    template: "opposition"
    description: "对他人在初审公告的商标提出异议"
  - id: "review"
    name: "商标复审"
    template: "opposition"
    description: "对驳回决定申请复审"
  - id: "invalidation"
    name: "商标无效"
    template: "opposition"
    description: "对已注册商标提出无效宣告"
  - id: "change"
    name: "商标变更"
    template: "registration"
    description: "著录项目变更、商标转让、许可备案"
