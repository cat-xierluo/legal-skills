# trademark.yaml — 商标案件预设
# 覆盖商标注册 / 异议 / 驳回复审 / 无效宣告 / 变更转让 5 种子业务
# 业务子类型作为元数据字段表达，不拆子预设
# 目录结构：项目根 + 7 个平铺分类目录（01-07），不按申请号分子目录

meta:
  id: "trademark"
  name: "商标案件"
  description: "商标注册、异议、驳回复审、无效宣告、变更转让案件（知产业务）"
  case_id_format: "{YYMMDD} {客户简称} {业务类型}"
  case_name_format: "{客户简称} {商标名} {业务类型}"
  example_case_id: "251119 方帅体育 商标注册"
  example_case_name: "方帅体育 镭战联盟 商标注册案"

# 7 个平铺分类目录（与现有项目的"1、2、3、4、5、6、7"惯例一致）
# 多个申请号的同类文件归位到一起（如 90752080 + 91575817 的申请书都进 03）
directories:
  - id: "01"
    icon: "📑"
    name: "委托材料"
    description: "商标代理委托书、商标评审代理委托书、商标异议代理委托书、商标代理合同、营业执照、身份证、律所执业许可证、公证委托、商标许可授权书"
    core_files:
      - "商标代理委托书（首签）"
      - "商标代理合同"
      - "营业执照"

  - id: "02"
    icon: "🖼️"
    name: "商标图样"
    description: "商标图样（黑白稿、彩色稿、修改版本、设计源文件、图样汇总表）"
    core_files:
      - "商标图样"

  - id: "03"
    icon: "✍️"
    name: "申请书"
    description: "律师起草：注册申请书、商标异议申请书、驳回商标注册申请复审申请书、无效宣告请求书/答辩书、暂缓审查申请书、证据目录、答辩材料目录"
    core_files:
      - "注册申请书"

  - id: "04"
    icon: "🏛️"
    name: "官方文书"
    description: "商标局文书：受理通知书、补正通知书、缴费通知书、不予受理通知、驳回通知书、初步审定公告、部分驳回通知、注册证、变更证明、驳回复审决定书、异议决定书、无效宣告请求裁定书、工商变更通知"
    core_files:
      - "商标局受理通知书"
      - "商标局驳回通知书"
      - "商标注册证"

  - id: "05"
    icon: "📎"
    name: "证据材料"
    description: "异议/驳回复审/无效案件证据：商标使用证据、知名度证据、抢注信息表、对方侵权证据、合同/发票/宣传材料、证据附件"
    core_files:
      - "证据目录"

  - id: "06"
    icon: "📊"
    name: "律师工作文件"
    description: "检索报告、查询报告、注册状态报告、驳回分析、审查意见分析、申请规划、报价方案、AI材料、商标监测报告"
    core_files:
      - "商标检索报告"
      - "申请规划"

  - id: "07"
    icon: "💰"
    name: "发票/财务"
    description: "律师费发票、官费发票、缴费状态查询"
    core_files:
      - "律师费发票"

management_files:
  case_info:
    enabled: true
    template: "templates/trademark-info.md"
    output: "[项目编号] 项目信息.md"
  timesheet:
    enabled: false
  deadline_yaml:
    enabled: false
  task_list:
    enabled: true
    template: "templates/trademark-task-list.md"
    output: "[项目编号] 待办事项.md"

detection:
  path_patterns:
    - "商标"
    - "trademark"
    - "知产"
  material_hints:
    - "商标代理委托书"
    - "商标注册申请书"
    - "商标驳回通知书"
    - "商标注册证"
    - "商标异议"
    - "商标复审"
    - "商标驳回复审"
    - "商标无效宣告"
    - "商标变更"
    - "尼斯分类"
  negative_hints:
    - "传票"
    - "应诉通知书"
    - "判决书"
    - "起诉状"

classification:
  # 01 - 委托材料：委托书、合同、主体资格
  - match: ["商标代理委托书", "商标评审代理委托书", "商标异议代理委托书", "评审委托", "异议委托", "委托书"]
    target: "01"
  - match: ["商标代理合同", "代理合同"]
    target: "01"
  - match: ["营业执照", "身份证", "执业许可证", "公证委托", "商标许可授权书", "法定代表人身份证明", "主体资格证照"]
    target: "01"

  # 02 - 商标图样
  - match: ["商标图样", "申请商标", "logo", "黑白", "彩稿", "图标"]
    target: "02"
  - match: ["商标图样汇总表", "图样汇总"]
    target: "02"

  # 03 - 申请书（律师起草）
  - match: ["注册申请书", "商标异议申请书", "驳回商标注册申请复审申请书", "驳回复审申请书", "无效宣告请求书", "无效宣告答辩书", "暂缓审查申请书", "证据目录", "答辩材料目录", "证据材料清单", "申请书"]
    target: "03"

  # 04 - 官方文书
  - match: ["受理通知书", "补正通知书", "缴费通知书", "不予受理", "驳回通知书", "初步审定公告", "初审公告", "部分驳回", "注册证", "变更证明", "驳回复审决定书", "异议决定书", "无效宣告请求裁定书", "商标评审申请受理通知书", "工商变更通知"]
    target: "04"

  # 05 - 证据材料
  - match: ["证据", "微信截图", "展会照片", "交易票据", "抢注信息表", "申请信息表", "附件"]
    target: "05"

  # 06 - 律师工作文件
  - match: ["检索报告", "查询报告", "注册状态", "驳回分析", "审查意见", "申请规划", "商标监测", "分析报告", "AI材料", "AI咨询", "AI整理", "报价方案", "价目表"]
    target: "06"

  # 07 - 发票/财务
  - match: ["律师费发票", "代理费发票", "官费发票", "支付状态"]
    target: "07"

# 关键时间线事件类型枚举（用于 trademark-info.md 时间线字段）
timeline_event_types:
  - 委托签约
  - 提交申请
  - 受理
  - 补正
  - 缴费
  - 驳回
  - 复审申请
  - 复审决定
  - 公告
  - 注册
  - 异议申请
  - 异议决定
  - 无效申请
  - 无效裁定
  - 变更
  - 续展

# 业务子类型枚举
business_types:
  - id: "registration"
    name: "商标注册"
    description: "首次申请商标注册"
  - id: "opposition"
    name: "商标异议"
    description: "对初审公告商标提出异议"
  - id: "review"
    name: "商标复审"
    description: "对驳回决定申请复审（驳回复审）"
  - id: "invalidation"
    name: "无效宣告"
    description: "对已注册/公告商标提出无效宣告"
  - id: "change"
    name: "变更转让"
    description: "商标变更、转让、续展"
