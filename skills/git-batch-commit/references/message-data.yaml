# 提交消息生成数据配置
# 用于 generate_commit_message.py 生成约定式提交信息

file_to_function_map:
  - pattern: 'search\.py$'
    description: '代码语义搜索模块（支持函数/类/导入/文档搜索）'
  - pattern: 'qa\.py$'
    description: '智能问答模块（意图分类 + 结构化回答生成）'
  - pattern: 'query\.py$'
    description: '查询构建器（生成结构化查询语句）'
  - pattern: 'parser\.py$'
    description: '解析器（文本/代码/数据解析）'
  - pattern: 'analyzer\.py$'
    description: '分析器（代码/数据/性能分析）'
  - pattern: 'architecture\.py$'
    description: '架构分析器（目录结构/模块划分/设计模式检测）'
  - pattern: 'quality\.py$'
    description: '代码质量分析器（注释覆盖率/技术债务/潜在问题检测）'
  - pattern: 'utils\.py$'
    description: '通用工具函数库'
  - pattern: 'helpers\.py$'
    description: '辅助函数（特定场景的便捷方法）'
  - pattern: 'common\.py$'
    description: '公共模块（共享常量和函数）'
  - pattern: 'config\.py$'
    description: '配置管理模块（加载/解析/验证配置）'
  - pattern: 'models\.py$'
    description: '数据模型定义（ORM/Schema/Entity）'
  - pattern: 'types\.py$'
    description: '类型定义（Type Hints/Interfaces）'
  - pattern: 'constants\.py$'
    description: '常量定义（枚举/配置值/魔法数字）'
  - pattern: 'schemas\.py$'
    description: '数据 Schema 定义（验证规则/序列化）'
  - pattern: 'exceptions\.py$'
    description: '自定义异常类（错误码/错误消息）'
  - pattern: 'validators\.py$'
    description: '数据验证器（输入校验/格式检查）'
  - pattern: 'converters?\.py$'
    description: '数据转换器（格式转换/编码转换）'
  - pattern: 'formatters?\.py$'
    description: '格式化器（输出美化/模板渲染）'
  - pattern: 'renderers?\.py$'
    description: '渲染器（HTML/PDF/图片生成）'
  - pattern: 'generators?\.py$'
    description: '生成器（代码/文档/数据生成）'
  - pattern: 'extractors?\.py$'
    description: '提取器（从文本/网页/文件提取信息）'
  - pattern: 'transformers?\.py$'
    description: '数据转换管道（ETL/清洗/标准化）'
  - pattern: 'loaders?\.py$'
    description: '加载器（文件/网络/数据库加载）'
  - pattern: 'savers?\.py$'
    description: '保存器（持久化/导出/备份）'
  - pattern: 'storage\.py$'
    description: '存储层抽象（本地/云存储/缓存）'
  - pattern: 'handlers?\.py$'
    description: '事件处理器（HTTP/WebSocket/信号处理）'
  - pattern: 'managers?\.py$'
    description: '资源管理器（生命周期/连接池/状态）'
  - pattern: 'services?\.py$'
    description: '业务服务层（核心业务逻辑）'
  - pattern: 'processors?\.py$'
    description: '数据处理器（批处理/流处理/异步处理）'
  - pattern: 'clients?\.py$'
    description: 'API 客户端（HTTP/RPC/GraphQL）'
  - pattern: 'servers?\.py$'
    description: '服务端实现（路由/中间件/错误处理）'
  - pattern: 'api\.py$'
    description: 'API 接口定义（端点/参数/响应）'
  - pattern: 'routes?\.py$'
    description: '路由配置（URL 映射/参数提取）'
  - pattern: 'views?\.py$'
    description: '视图层（页面渲染/模板上下文）'
  - pattern: 'controllers?\.py$'
    description: '控制器（请求处理/响应封装）'
  - pattern: 'middleware\.py$'
    description: '中间件（请求/响应拦截器）'
  - pattern: 'auth\.py$'
    description: '认证模块（登录/登出/Token 管理）'
  - pattern: 'permissions?\.py$'
    description: '权限控制（角色/资源/操作检查）'
  - pattern: 'security\.py$'
    description: '安全模块（加密/签名/防护）'
  - pattern: 'database\.py$'
    description: '数据库连接管理（连接池/事务/会话）'
  - pattern: 'db\.py$'
    description: '数据库操作层（CRUD/查询构建）'
  - pattern: 'cache\.py$'
    description: '缓存层（Redis/Memcached/内存缓存）'
  - pattern: 'repository\.py$'
    description: '仓储层（数据访问抽象）'
  - pattern: 'logger\.py$'
    description: '日志模块（格式化/分级/输出）'
  - pattern: 'monitoring\.py$'
    description: '监控模块（指标收集/告警）'
  - pattern: 'metrics\.py$'
    description: '指标定义（计数器/仪表/直方图）'
  - pattern: 'test.*\.py$'
    description: '单元测试/集成测试'
  - pattern: 'conftest\.py$'
    description: 'Pytest 配置与 Fixtures'
  - pattern: 'mock.*\.py$'
    description: 'Mock 对象与测试替身'
  - pattern: '\.tsx?$'
    description: 'TypeScript/React 前端组件'
  - pattern: '\.vue$'
    description: 'Vue.js 组件（模板/脚本/样式）'
  - pattern: '\.svelte$'
    description: 'Svelte 组件（编译时优化）'
  - pattern: '__init__\.py$'
    description: 'Python 模块初始化（导出/版本）'
  - pattern: '__main__\.py$'
    description: '命令行入口（python -m module）'
  - pattern: 'SKILL\.md$'
    description: 'Claude Code 技能定义文件'
  - pattern: 'CHANGELOG\.md$'
    description: '版本变更日志'
  - pattern: 'README\.md$'
    description: '项目说明文档'

message_templates:
  deps:
    patterns:
      - pattern: 'package\.json'
        message: '更新 JavaScript 依赖'
      - pattern: 'requirements\.txt'
        message: '更新 Python 依赖'
      - pattern: 'go\.(mod|sum)'
        message: '更新 Go 依赖'
      - pattern: 'Gemfile'
        message: '更新 Ruby 依赖'
      - pattern: 'Cargo\.toml'
        message: '更新 Rust 依赖'
      - pattern: 'pyproject\.toml'
        message: '更新 Python 项目配置'
    default: '更新依赖'
  docs:
    patterns:
      - pattern: 'README'
        message: '更新 README 文档'
      - pattern: 'CHANGELOG'
        message: '更新变更日志'
      - pattern: 'CONTRIBUTING'
        message: '更新贡献指南'
      - pattern: 'ARCHITECTURE'
        message: '更新架构文档'
      - pattern: 'AGENTS\.md'
        message: '更新协作规范文档'
      - pattern: 'SKILL-GUIDE\.md'
        message: '更新 Skill 开发指南'
      - pattern: 'skills/([^/]+)/SKILL\.md'
        message: '添加 \1 技能文档'
    default: '更新文档'
  license:
    default: '更新许可证文件'
  config:
    patterns:
      - pattern: '\.env\.example'
        message: '更新环境变量示例'
      - pattern: '\.yaml|\.yml'
        message: '更新 YAML 配置'
      - pattern: 'toml'
        message: '更新 TOML 配置'
    default: '更新配置'
  test:
    default: '更新测试'
  chore:
    patterns:
      - pattern: '\.gitignore'
        message: '更新 gitignore 忽略规则'
      - pattern: 'Dockerfile'
        message: '更新 Docker 配置'
      - pattern: '\.github/'
        message: '更新 GitHub 工作流'
      - pattern: 'Makefile'
        message: '更新 Makefile'
    default: '更新工具配置'
  feat:
    patterns:
      - pattern: 'scripts/([^/]+)'
        message: '添加 \1 脚本'
      - pattern: 'test/([^/]+)'
        message: '添加 \1 测试'
    default: '添加新功能'
  fix:
    default: '修复 Bug'
  refactor:
    default: '重构代码'
  style:
    default: '调整代码风格'

