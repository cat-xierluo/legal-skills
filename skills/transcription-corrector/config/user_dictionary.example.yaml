# Transcription Corrector 用户词典模板
# 首次使用请复制为 user_dictionary.yaml（与本文件同目录），并在 terms 中维护
# 你的本地个性化术语。本文件只记录正确写法，不需要维护"错误词 -> 正确词"映射
#
# 词典的角色：目标值 + 置信度权重，不是触发器
# - 词典项是"正确写法"，告诉 AI 目标值是什么
# - 词典项不直接触发替换：AI 仍须先做上下文判断
# - 词典项提高候选替换的胜出权重：当多个候选写法竞争时，登记项优先
# - 词典不绕过上下文判断——脱离上下文的同形词不会被"硬拉"过去
# - 不要把词典理解为"错误词 -> 正确词"映射表
# - 不要为了使用词典而强行替换普通词
# - 模糊或低置信场景保持原文，不做猜测式替换
#
# 词典项的判断三重确认（任一不满足则不替换）：
#   1. 词典里有对应目标值
#   2. 上下文明确指向该目标值所代表的对象
#   3. 形式漂移证据成立（大小写/空格/连字符/漏字/同音/形近/断词）
#
# 配置解耦原则：
# - 本 example.yaml 只放"行业公认、跨用户通用"的术语（不放入个人项）
#   - 常见技术名词：行业公认的产品 / 平台 / 格式 / 缩写（ASR 容易听错）
#   - 常见法律用语：法律行业通用术语（ASR 容易听错为同音字 / 形近字）
# - 私有人名、律所名、客户代号、自家业务术语 → 在你本地 user_dictionary.yaml 里追加
# - 你本地的 user_dictionary.yaml 不要提交到 Git（已被 .gitignore 覆盖）
# - 多用户/多设备共用时，可把 user_dictionary.yaml 软链到统一位置
#
# "换另一个用户 clone 这个仓库，他需要这一项吗？"判断标准：
# - 需要（跨用户都用的工具 / 术语）→ 写本文件
# - 不需要（个人工作栈 / 私有项目名）→ 写本地 user_dictionary.yaml

version: 1

# 通用术语列表
# 仅放行业公认的、不区分用户的"目标值"
# 个人化项请在本地 user_dictionary.yaml 中追加
terms:
  # === 工具 / 产品 / 平台（行业公认，跨用户通用）===
  # AI 编码与智能体平台
  - "WorkBuddy"
  - "Claude Code"
  - "Codex"
  - "Cursor"
  - "Anthropic"
  - "OpenAI"
  - "Coze"
  - "Ollama"
  - "Manus"
  - "Moltbook"

  # 国产 / 常用大模型与 AI 工具
  - "DeepSeek"
  - "腾讯元宝"
  - "豆包"
  - "智和"
  - "Alpha"

  # 笔记 / 知识管理
  - "Obsidian"
  - "Flomo"
  - "Cubox"

  # 转录 / 文档处理
  - "FunASR"
  - "MinerU"

  # 协作 / 通讯
  - "Discord"
  - "Slack"

  # 工程 / 工具
  - "Docker"
  - "Playwright"
  - "MonoRepo"
  - "clawhub"
  - "GitHub"
  - "Markdown"

  # 常见英文缩写（ASR 容易把字母拆开识别）
  - "MCP"
  - "AI"
  - "Auto"             # 模型选择模式（WorkBuddy / Claude Code 等都有 auto 档位）

  # === 通用术语（注意大小写）===
  - "skill"
  - "Skill"

  # === 法律行业通用术语（ASR 容易听错为同音字 / 形近字）===
  # 知识产权类
  - "知识产权"
  - "专利"
  - "商标"
  - "著作权"

  # 合同 / 争议解决
  - "合同"
  - "诉讼"
  - "仲裁"

  # 主体 / 程序
  - "代理"
  - "律师"
  - "当事人"
