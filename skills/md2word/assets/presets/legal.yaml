name: "法律文书格式"
description: "标准法律文书格式，仿宋_GB2312，小四号，1.5倍行距"

# 页面设置
page:
  width: 21.0      # cm (A4)
  height: 29.7     # cm (A4)
  margin_top: 2.54
  margin_bottom: 2.54
  margin_left: 3.18
  margin_right: 3.18

# 字体设置
fonts:
  default:
    name: "仿宋"
    name_alt: "仿宋_GB2312"
    ascii: "Times New Roman"
    size: 12      # pt (小四)
    color: "#000000"

# 标题设置
titles:
  level1:
    size: 15      # pt (小三)
    bold: true
    align: "center"
    space_before: 6
    space_after: 6
    indent: 0
  level2:
    size: 12      # pt (小四)
    bold: true
    align: "justify"
    indent: 24
    space_before: 9   # 0.5行距 (12pt × 1.5 × 0.5)
    space_after: 9    # 0.5行距
  level3:
    size: 12      # pt (小四)
    bold: true
    align: "justify"
    indent: 24
    space_before: 9   # 0.5行距
    space_after: 9    # 0.5行距
  level4:
    size: 12      # pt (小四)
    bold: true
    align: "justify"
    indent: 24

# 段落设置
paragraph:
  line_spacing: 1.5
  first_line_indent: 24  # 2个字符
  align: "justify"

# 页码设置
page_number:
  enabled: true
  format: "1/x"
  font: "Times New Roman"
  size: 10.5    # pt (五号)
  position: "center"

# 引号设置
quotes:
  convert_to_chinese: true

# 表格设置（FIGURES-OUTLINE 配图风格规范配色）
# 主蓝 #2C5282 / 浅灰 #EDF2F7 / 边框 #CBD5E0 / 文字深 #1A202C
table:
  border_enabled: true
  border_color: "#CBD5E0"          # 边框：浅灰细线
  border_width: 4
  line_spacing: 1.2
  row_height_cm: 0.8
  alignment: "center"
  cell_margin:
    top: 30
    bottom: 30
    left: 60
    right: 60
  vertical_align: "center"
  rounded_corners: true            # 圆角边框

  # 表格标题行（第一行）格式：主蓝底 + 白字
  header:
    font: "Times New Roman"
    size: 10.5
    bold: true
    color: "#FFFFFF"                # 白字
    background_color: "#2C5282"     # 主蓝底纹（点缀用）

  # 表格正文格式
  body:
    font: "仿宋"
    font_alt: "仿宋_GB2312"
    size: 10.5
    color: "#1A202C"                # 深色文字

  # 隔行底纹（斑马纹）：浅灰交替
  row_even:
    background_color: "#EDF2F7"     # 偶数行浅灰底纹
  row_odd:
    background_color: "#FFFFFF"     # 奇数行白底

# 代码块设置（出版级：等宽字体 + 浅灰底纹 + 细边框 + 关拼写检查）
code_block:
  # 语言标签格式（代码块开头的 [language] 标签；enabled=false 可隐藏标签）
  label:
    enabled: false
    font: "Times New Roman"
    size: 10
    color: "#808080"

  # 代码内容格式
  content:
    font: "Consolas"            # 等宽字体（ASCII/CS）
    east_asia_font: "等线"      # 东亚字符（代码里的中文 prompt 等）
    size: 9
    color: "#333333"
    left_indent: 0
    line_spacing: 1.2
    background_color: "#F5F5F5" # 浅灰底纹（留空则不加，向后兼容）
    border_color: "#D0D0D0"     # 段落边框，相邻行自动连成完整框（留空则不加）
    border_size: 4              # 边框粗细，1/8 pt 单位
    no_proofread: true          # 关闭拼写检查

# 行内代码设置（等宽 + 浅灰底，与代码块风格一致）
inline_code:
  font: "Consolas"
  east_asia_font: "等线"
  size: 10
  color: "#333333"
  background_color: "#F0F0F0"

# 引用块设置（无视觉样式：与正文一致，不加底纹/边框/缩进）
quote:
  background_color: null
  left_indent_inches: 0
  border_color: null
  font_size: null   # null = 继承正文
  line_spacing: null

# 数学公式设置
math:
  font: "Times New Roman"
  size: 11
  italic: true
  color: "#00008B"

# 图片设置
image:
  display_ratio: 1.0
  max_width_cm: 14.64
  target_dpi: 400
  show_caption: true

# 分割线设置
horizontal_rule:
  character: "─"
  repeat_count: 55
  font: "Times New Roman"
  size: 12
  color: "#808080"
  alignment: "center"

# 列表设置
lists:
  bullet:
    marker: "•"
    indent: 24

  numbered:
    indent: 24
    preserve_format: true

  task:
    unchecked: "☐"
    checked: "☑"
